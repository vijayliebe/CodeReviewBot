# backend_service/.crb/rules.yaml
# Custom business and architectural rules for the backend service

project:
  name: "backend-service"
  type: "microservice"

domain_rules:
  - id: no-float-for-money
    description: "Never use float for monetary calculations in billing files. Use Decimal instead."
    pattern: "float\\("
    files: ["**/billing.py", "**/payment*.py"]
    severity: "critical"
    suggestion: "Use `from decimal import Decimal` instead of float()"

architecture_rules:
  - id: no-direct-db-in-controllers
    description: "Controllers must not import models directly. Use the service layer."
    pattern: "from.*models import|import.*models"
    files: ["**/controllers/*.py", "**/controller.py"]
    severity: "medium"
    suggestion: "Access database models through service classes in services/ instead of importing them directly."

integration_rules:
  - id: redis-key-prefix
    description: "All Redis keys in the backend service must start with 'backend:'"
    pattern: "\\b\\w+\\.(set|get|delete|del)\\(\\s*f?[\"'](?!backend:)"
    files: ["**/*.py"]
    severity: "high"
    suggestion: "Add the 'backend:' prefix to your cache key. Example: redis.set('backend:session_id', val)"
